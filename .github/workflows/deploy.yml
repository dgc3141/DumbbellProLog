name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: "deploy-prod"
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1 # Default region, adjust if needed

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install and Build Backend
        run: |
          cd backend
          npm ci
          npm run build
          npm test
          echo "Backend build and tests complete."

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
          echo "Frontend build complete."

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy-infra:
    name: Deploy CDK Infrastructure
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: |
          cd infra
          npm ci

      - name: CDK Deploy
        run: |
          cd infra
          npx cdk deploy --all --require-approval never
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          GEMINI_MODEL_ID: ${{ secrets.GEMINI_MODEL_ID || 'gemini-3-flash-preview' }}
